<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DemliCoin — Giris</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="auth-sayfa">
  <div class="auth-kart">
    <div class="auth-logo">
      <div class="logo-icon-buyuk">DC</div>
      <h1>DemliCoin</h1>
      <p>Hesabiniza giris yapin</p>
    </div>
    <form id="giris-form">
      <div class="form-grup">
        <label>Nick</label>
        <input type="text" id="giris-nick" placeholder="Nickinizi girin" required autocomplete="username" />
      </div>
      <div class="form-grup">
        <label>Sifre</label>
        <input type="password" id="giris-sifre" placeholder="Sifrenizi girin" required autocomplete="current-password" />
      </div>
      <div id="giris-hata" class="hata-mesaj" style="display:none;"></div>
      <button type="submit" class="btn btn-ana btn-tam" style="height:44px;font-size:14px;">Giris Yap</button>
    </form>
    <div class="auth-alt">
      Hesabiniz yok mu? <a href="/kayit">Kayit Ol</a> — 500 jeton hediye
    </div>
  </div>

  <script>
    const url = new URLSearchParams(window.location.search);
    if (url.get('hata') === 'yasakli') {
      const h = document.getElementById('giris-hata');
      h.textContent = 'Hesabiniz yasaklanmistir.';
      h.style.display = 'block';
    }

    document.getElementById('giris-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nick = document.getElementById('giris-nick').value.trim();
      const sifre = document.getElementById('giris-sifre').value;
      const hata = document.getElementById('giris-hata');
      hata.style.display = 'none';

      const r = await fetch('/api/giris', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nick, sifre })
      });
      const d = await r.json();
      if (d.basari) {
        window.location.href = '/';
      } else {
        hata.textContent = d.mesaj;
        hata.style.display = 'block';
      }
    });
  </script>
</body>
</html>
