<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DemliCoin — Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="sayfa-body">
  <header class="ust-bar">
    <div class="logo-alan">
      <a href="/" class="logo-link">
        <div class="logo-mark">DC</div>
        <span class="logo-text">DemliCoin</span>
      </a>
    </div>
    <div class="kullanici-bilgi">
      <span class="nick-pill" id="hosgeldin-nick"></span>
      <div class="jeton-pill">
        <span class="jeton-label">JETON</span>
        <span class="jeton-sayi" id="jeton-miktar">0</span>
      </div>
      <div class="nav-sep"></div>
      <a href="/" class="nav-link">Oyun</a>
      <a href="/liderlik" class="nav-link">Liderlik</a>
      <button onclick="cikisYap()" class="btn-ghost-kirmizi">Cikis</button>
    </div>
  </header>

  <div class="sayfa-icerik">
    <div class="sayfa-baslik-grup">
      <h1 class="sayfa-h1">Market</h1>
    </div>

    <div class="sekme-bar">
      <button class="sekme-btn aktif-sekme" onclick="sekmeAc('gucler',this)">Ozel Gucler</button>
      <button class="sekme-btn" onclick="sekmeAc('jetonlar',this)">Jeton Paketleri</button>
      <button class="sekme-btn" onclick="sekmeAc('promo',this)">Promosyon Kodu</button>
      <button class="sekme-btn" onclick="sekmeAc('odeme',this)">Kart ile Odeme</button>
    </div>

    <div id="sekme-gucler">
      <div id="guc-grid" class="guc-grid"></div>
    </div>

    <div id="sekme-jetonlar" style="display:none;">
      <div id="paket-grid" class="paket-grid"></div>
    </div>

    <div id="sekme-promo" style="display:none;">
      <div class="promo-sayfa-wrap">
        <div class="promo-sayfa-kart">
          <h2 style="font-size:18px;font-weight:800;margin-bottom:8px;">Promosyon Kodu Kullan</h2>
          <p style="font-size:13px;color:var(--t2);margin-bottom:20px;">Kodunuzu girin, jeton veya item kazan.</p>
          <div class="promo-wrap" style="display:flex;max-width:420px;">
            <input id="promo-input" class="promo-input" type="text" placeholder="PROMOSYON KODU" maxlength="30" />
            <button onclick="promoKullan()" class="promo-btn">KULLAN</button>
          </div>
          <div id="promo-msg" class="market-bildirim" style="display:none;margin-top:14px;position:static;"></div>
        </div>
      </div>
    </div>

    <div id="sekme-odeme" style="display:none;">
      <div style="padding:20px 0;">
        <div class="odeme-form">
          <div class="odeme-baslik">Kart ile Odeme</div>
          <div class="fg">
            <label class="auth-label">Paket Secin</label>
            <select class="auth-input" id="odeme-paket">
              <option value="1500">Starter — 1.500 Jeton — 29.99 TL</option>
              <option value="5000">Bronz — 5.000 Jeton — 79.99 TL</option>
              <option value="7500">Gumus — 7.500 Jeton — 109.99 TL</option>
              <option value="10000">Altin — 10.000 Jeton — 139.99 TL</option>
              <option value="15000">Elmas — 15.000 Jeton — 199.99 TL</option>
              <option value="20000">Efsane — 20.000 Jeton — 249.99 TL</option>
            </select>
          </div>
          <div class="fg">
            <label class="auth-label">Kart Sahibinin Adi</label>
            <input class="auth-input" type="text" placeholder="AD SOYAD" maxlength="40" autocomplete="cc-name" />
          </div>
          <div class="fg kart-input-wrap">
            <label class="auth-label">Kart Numarasi</label>
            <input class="auth-input" type="text" placeholder="0000 0000 0000 0000" maxlength="19" autocomplete="cc-number" id="kart-no" oninput="kartFormat(this)" />
            <span class="kart-ikon">💳</span>
          </div>
          <div class="odeme-row">
            <div class="fg">
              <label class="auth-label">Son Kullanma</label>
              <input class="auth-input" type="text" placeholder="AA/YY" maxlength="5" autocomplete="cc-exp" id="kart-exp" oninput="expFormat(this)" />
            </div>
            <div class="fg">
              <label class="auth-label">CVV</label>
              <input class="auth-input" type="password" placeholder="•••" maxlength="4" autocomplete="cc-csc" />
            </div>
          </div>
          <button class="odeme-btn" onclick="odemeYap()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            ODEMEYI TAMAMLA
          </button>
          <div class="odeme-guvenli">
            <svg width="12" height="14" viewBox="0 0 24 28" fill="none"><path d="M12 2L4 6v6c0 5.5 3.5 10.7 8 12 4.5-1.3 8-6.5 8-12V6L12 2z" fill="currentColor" opacity="0.6"/></svg>
            256-bit SSL ile korunan guvenli odeme
          </div>
          <div class="odeme-kartlar">
            <span class="kart-rozet visa">VISA</span>
            <span class="kart-rozet mc">MC</span>
            <span class="kart-rozet troy">TROY</span>
          </div>
          <div id="odeme-msg" style="display:none;margin-top:14px;"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" style="display:none;"></div>

  <script>
    let kullanici = null;

    async function init() {
      const r = await fetch('/api/benim-bilgilerim');
      if (!r.ok) { window.location.href = '/giris'; return; }
      const d = await r.json();
      if (!d.basari) { window.location.href = '/giris'; return; }
      kullanici = d.kullanici;
      document.getElementById('hosgeldin-nick').textContent = kullanici.nick;
      document.getElementById('jeton-miktar').textContent = kullanici.jeton.toLocaleString('tr-TR');
      yukleGucler();
      yuklePaketler();
    }

    async function yukleGucler() {
      const r = await fetch('/api/market/itemlar');
      const d = await r.json();
      const grid = document.getElementById('guc-grid');
      grid.innerHTML = '';
      const meta = {
        'iki_kat_kar':   { etiket: '2X', renk: '#f0b429', acik: 'rgba(240,180,41,0.08)' },
        'zarar_kalkan':  { etiket: 'KLK', renk: '#60a5fa', acik: 'rgba(96,165,250,0.08)' },
        'para_kopar':    { etiket: 'ROB', renk: '#f87171', acik: 'rgba(248,113,113,0.08)' },
        'celik_kart':    { etiket: '💎', renk: '#b8e0ff', acik: 'rgba(184,224,255,0.08)' },
      };
      d.itemlar.forEach(item => {
        const m = meta[item.kod] || { etiket: 'ITM', renk: '#a78bfa', acik: 'rgba(167,139,250,0.08)' };
        const fiyatStr = item.para_birimi === 'jeton' ? `${item.fiyat.toLocaleString('tr-TR')} Jeton`
          : item.para_birimi === 'tl' ? `${item.fiyat.toFixed(2)} TL` : `${item.fiyat.toFixed(2)} USD`;
        grid.innerHTML += `
          <div class="guc-kart" style="--accent:${m.renk};--acik:${m.acik}">
            <div class="guc-ikon">${m.etiket}</div>
            <div class="guc-isim">${item.isim}</div>
            <div class="guc-aciklama">${item.aciklama}</div>
            <div class="guc-alt">
              <span class="guc-kullanim">${item.kullanim_hakki}x kullanim</span>
              <span class="guc-fiyat">${fiyatStr}</span>
            </div>
            <button class="guc-btn" onclick="satinAl(${item.id})">SATIN AL</button>
          </div>`;
      });
    }

    async function yuklePaketler() {
      const r = await fetch('/api/market/jeton-paketleri');
      const d = await r.json();
      const grid = document.getElementById('paket-grid');
      grid.innerHTML = '';
      const etiketler = ['STARTER','BRONZ','GUMUS','ALTIN','ELMAS','EFSANE'];
      const renkler = ['#94a3b8','#cd7f32','#a8b8c8','#f0b429','#67e8f9','#e879f9'];
      d.paketler.forEach((p, i) => {
        const fiyatStr = p.para_birimi === 'tl' ? `${p.fiyat.toFixed(2)} TL` : `${p.fiyat.toFixed(2)} USD`;
        const renk = renkler[i] || '#a78bfa';
        grid.innerHTML += `
          <div class="paket-kart" style="--accent:${renk}">
            <div class="paket-etiket">${etiketler[i] || 'PAKET'}</div>
            <div class="paket-jeton mono">${p.jeton_miktari.toLocaleString('tr-TR')}</div>
            <div class="paket-jeton-label">JETON</div>
            <div class="paket-fiyat mono">${fiyatStr}</div>
            <button class="paket-btn" onclick="paketAl(${p.id})">SATIN AL</button>
          </div>`;
      });
    }

    async function satinAl(id) {
      const r = await fetch('/api/market/satin-al', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({item_id:id}) });
      const d = await r.json();
      toast(d.mesaj, d.basari);
      if (d.basari) { kullanici.jeton = d.yeniJeton; document.getElementById('jeton-miktar').textContent = d.yeniJeton.toLocaleString('tr-TR'); }
    }

    async function paketAl(id) {
      const r = await fetch('/api/market/jeton-satin-al', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({paket_id:id}) });
      const d = await r.json();
      toast(d.mesaj, d.basari);
      if (d.basari) { kullanici.jeton = d.yeniJeton; document.getElementById('jeton-miktar').textContent = d.yeniJeton.toLocaleString('tr-TR'); }
    }

    function sekmeAc(s, btn) {
      document.getElementById('sekme-gucler').style.display = s==='gucler'?'block':'none';
      document.getElementById('sekme-jetonlar').style.display = s==='jetonlar'?'block':'none';
      document.getElementById('sekme-promo').style.display = s==='promo'?'block':'none';
      document.getElementById('sekme-odeme').style.display = s==='odeme'?'block':'none';
      document.querySelectorAll('.sekme-btn').forEach(b=>b.classList.remove('aktif-sekme'));
      btn.classList.add('aktif-sekme');
    }

    function kartFormat(el) {
      let v = el.value.replace(/\D/g,'').substring(0,16);
      el.value = v.replace(/(.{4})/g,'$1 ').trim();
    }

    function expFormat(el) {
      let v = el.value.replace(/\D/g,'');
      if (v.length >= 2) v = v.substring(0,2) + '/' + v.substring(2,4);
      el.value = v;
    }

    function odemeYap() {
      const msg = document.getElementById('odeme-msg');
      msg.innerHTML = '<div style="background:#111;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:14px;font-size:13px;color:#8899bb;text-align:center;">Odeme altyapisi aktif degil. Lutfen yoneticiyle iletisime gecin.</div>';
      msg.style.display = 'block';
    }

    async function promoKullan() {
      const kod = document.getElementById('promo-input').value.trim();
      if (!kod) return;
      const r = await fetch('/api/promosyon/kullan', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({kod}) });
      const d = await r.json();
      const el = document.getElementById('promo-msg');
      el.textContent = d.mesaj;
      el.className = `market-bildirim ${d.basari ? 'bildirim-basari' : 'bildirim-hata'}`;
      el.style.display = 'block';
      if (d.basari) {
        document.getElementById('promo-input').value = '';
        kullanici.jeton = d.yeniJeton;
        document.getElementById('jeton-miktar').textContent = d.yeniJeton.toLocaleString('tr-TR');
      }
    }

    function toast(msg, ok) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    async function cikisYap() { await fetch('/api/cikis',{method:'POST'}); window.location.href='/giris'; }
    init();
  </script>
</body>
</html>
