<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DemliCoin</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div id="uygulama">
    <header class="ust-bar">
      <div class="logo-alan">
        <div class="logo-icon">DC</div>
        <span class="logo-yazi">DemliCoin</span>
      </div>
      <div class="kullanici-bilgi">
        <span class="nick-goster" id="hosgeldin-nick"></span>
        <div class="jeton-goster">
          <span class="jeton-label">JETON</span>
          <span id="jeton-miktar">0</span>
        </div>
        <div class="nav-ayrac"></div>
        <a href="/market" class="btn btn-kucuk">Market</a>
        <a href="/liderlik" class="btn btn-kucuk">Liderlik</a>
        <button onclick="cikisYap()" class="btn btn-tehlike btn-kucuk">Cikis</button>
      </div>
    </header>

    <div class="ana-icerik">
      <!-- SOL PANEL -->
      <aside class="sol-panel">
        <div class="panel-baslik">
          <span>Cevrimici</span>
          <span id="oyuncu-sayisi" class="badge">0</span>
        </div>
        <div id="oyuncu-listesi" class="oyuncu-listesi"></div>
      </aside>

      <!-- ORTA -->
      <main class="orta-alan">

        <!-- Grafik -->
        <div class="grafik-kart">
          <div class="grafik-ust">
            <span class="grafik-baslik">DEMLICOIN / CANLI GRAFIK</span>
            <span id="grafik-deger" class="canli-deger mono">—</span>
          </div>
          <canvas id="grafik-canvas"></canvas>
        </div>

        <!-- Bahis -->
        <div class="bahis-panel" id="bahis-panel">
          <div class="bahis-baslik">Pozisyon Ac</div>
          <div class="bahis-icerik">
            <div class="input-grup">
              <label>Jeton Miktari</label>
              <input type="number" id="bahis-miktar" placeholder="100" min="1" value="100" />
            </div>
            <div class="bahis-butonlar">
              <button class="btn-yukari" onclick="bahistePara('yukari')">AL / YUKSELIS</button>
              <button class="btn-asagi" onclick="bahistePara('asagi')">SAT / DUSUS</button>
            </div>
          </div>

          <div id="aktif-bahis" class="aktif-bahis" style="display:none;">
            <div class="aktif-bilgi">
              <div class="aktif-bilgi-satir">
                <span>Pozisyon:</span>
                <strong id="aktif-miktar"></strong>
                <span>jeton</span>
              </div>
              <div class="aktif-bilgi-satir">
                <span>Giris:</span>
                <strong id="aktif-giris-deger"></strong>
              </div>
              <div id="anlik-kazan-goster" class="anlik-kazanc">+0</div>
            </div>
            <button class="btn-sat" onclick="satisYap()">POZISYONU KAPAT</button>
          </div>
        </div>

        <!-- Item Bar -->
        <div id="item-bar" class="item-bar"></div>

        <!-- Sonuc -->
        <div id="sonuc-bildirim" class="sonuc-bildirim" style="display:none;"></div>

        <!-- Chat -->
        <div class="chat-kart">
          <div class="chat-baslik">Canli Chat</div>
          <div id="chat-mesajlar" class="chat-mesajlar"></div>
          <div class="chat-gonder">
            <input type="text" id="chat-input" placeholder="Mesaj yaz..." maxlength="200" />
            <button onclick="mesajGonder()" class="btn-gonder">Gonder</button>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="/oyun.js"></script>
</body>
</html>
